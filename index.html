<!-- Add this where you want the view count to appear (at the bottom) -->
<div>Resume Views: <span id="view-count">Loading...</span></div>

<!-- Add this JavaScript code before the closing </body> tag -->
<script>
fetch('https://r18ymm12th.execute-api.us-east-1.amazonaws.com/ViewCounter')
  .then(response => response.json())
  .then(data => {
    document.getElementById('view-count').textContent = data.count;
  })
  .catch(error => {
    console.error('Error:', error);
    document.getElementById('view-count').textContent = 'Error loading count';
  });
</script>
