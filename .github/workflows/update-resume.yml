name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install mammoth boto3 beautifulsoup4
        
    - name: Convert with Precise Alignment Detection
      run: |
        python3 << 'EOF'
        import mammoth
        from bs4 import BeautifulSoup
        
        # Convert with Mammoth
        with open("resume.docx", "rb") as docx_file:
            result = mammoth.convert_to_html(docx_file)
            raw_html = result.value
        
        print("=== Applying precise alignment based on typical resume structure ===")
        
        # Parse HTML
        soup = BeautifulSoup(raw_html, 'html.parser')
        
        # Precise detection based on what's typically centered in resumes
        for p in soup.find_all('p'):
            text = p.get_text().strip()
            
            if text:
                # Only center these specific types of content
                should_center = False
                
                # Name header
                if "Donald Gardner" in text:
                    should_center = True
                    p['class'] = p.get('class', []) + ['name-header']
                
                # Contact info line
                elif any(contact in text for contact in ['425', 'gmail.com', 'LinkedIn', 'YouTube']) and len(text) < 100:
                    should_center = True
                    p['class'] = p.get('class', []) + ['contact-info']
                
                # Section headers (short lines with key words)
                elif (len(text.split()) <= 3 and 
                      any(keyword in text for keyword in ['Key Accomplishments', 'Professional Experience', 'Education', 'Certifications', 'Community'])):
                    should_center = True
                    p['class'] = p.get('class', []) + ['section-header']
                
                if should_center:
                    p['class'] = p.get('class', []) + ['centered-content']
                    print(f"CENTERING: '{text}'")
                else:
                    print(f"LEFT: '{text[:50]}...'")
        
        # Get modified HTML
        modified_html = str(soup)
        
        # Create final HTML with proper alignment and spacing
        final_html = f'''<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Donald Gardner - Resume</title>
            <style>
                body {{
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 30px 20px;
                    background: #f5f5f5;
                    color: #333;
                    line-height: 1.2;
                }}
                
                .resume-container {{
                    background: white;
                    padding: 40px;
                    border-radius: 10px;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                    border: 1px solid #ddd;
                }}
                
                /* Default - 11pt Calibri, left aligned, minimal spacing */
                p, div, span {{
                    font-size: 11pt !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                    margin: 0 0 6px 0 !important;
                    text-align: left !important;
                }}
                
                /* Name header - 16pt, centered */
                .name-header {{
                    font-size: 16pt !important;
                    font-weight: bold !important;
                    color: #2c3e50 !important;
                    margin-bottom: 8px !important;
                }}
                
                /* Centered content */
                .centered-content {{
                    text-align: center !important;
                }}
                
                /* Section headers get small caps */
                .section-header {{
                    font-variant: small-caps !important;
                    letter-spacing: 1px !important;
                    font-weight: 600 !important;
                    color: #2c3e50 !important;
                    margin: 20px 0 15px 0 !important;
                }}
                
                /* Contact info styling */
                .contact-info {{
                    color: #555 !important;
                    margin: 5px 0 !important;
                }}
                
                /* Lists - single spaced */
                ul, ol {{
                    margin: 5px 0 10px 25px !important;
                    padding: 0 !important;
                }}
                
                li {{
                    font-size: 11pt !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                    margin: 0 0 2px 0 !important;
                    line-height: 1.2 !important;
                }}
                
                strong {{
                    color: #2c3e50;
                    font-weight: 600;
                }}
                
                a {{
                    color: #3498db;
                    text-decoration: none;
                }}
                
                a:hover {{
                    text-decoration: underline;
                }}
            </style>
        </head>
        <body>
            <div class="resume-container">
                {modified_html}
            </div>
        </body>
        </html>'''
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(final_html)
        
        print("✅ Precise alignment applied with single spacing")
        EOF
        
    - name: Upload to S3 and Invalidate CloudFront
      run: |
        python3 << 'EOF'
        import boto3
        import time
        
        s3 = boto3.client('s3')
        with open('index.html', 'r', encoding='utf-8') as f:
            s3.put_object(
                Bucket='cloud-challenge01',
                Key='index.html',
                Body=f.read(),
                ContentType='text/html'
            )
        print("✅ Uploaded to S3")
        
        cloudfront = boto3.client('cloudfront')
        cloudfront.create_invalidation(
            DistributionId='E1D217O0NBRUC2',
            InvalidationBatch={
                'Paths': {'Quantity': 1, 'Items': ['/*']},
                'CallerReference': f'auto-{int(time.time())}'
            }
        )
        print("✅ CloudFront invalidated")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
