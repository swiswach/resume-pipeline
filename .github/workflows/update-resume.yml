name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install python-docx boto3
        
    - name: Convert with Precise Bullet Detection
      run: |
        python3 << 'EOF'
        from docx import Document
        from docx.shared import Pt
        from docx.enum.text import WD_ALIGN_PARAGRAPH
        
        # Open Word document
        doc = Document('resume.docx')
        
        html_content = []
        current_list = None
        
        print("=== Precise Bullet Detection ===")
        
        def close_current_list():
            global current_list, html_content
            if current_list:
                html_content.append('</ul>')
                current_list = None
        
        for i, paragraph in enumerate(doc.paragraphs):
            text = paragraph.text.strip()
            if not text:  # Skip empty paragraphs
                continue
            
            print(f"\nParagraph {i}: '{text[:60]}...'")
            
            # More precise bullet detection - only use reliable methods
            is_list_item = False
            
            # Method 1: Check numPr (numbering properties) - MOST RELIABLE
            if paragraph._element.pPr is not None:
                numPr = paragraph._element.pPr.numPr
                if numPr is not None:
                    is_list_item = True
                    print(f"  → BULLET (numPr): '{text}'")
            
            # Method 2: Check paragraph style - RELIABLE
            elif paragraph.style.name.startswith('List'):
                is_list_item = True
                print(f"  → BULLET (style): '{text}' (style: {paragraph.style.name})")
            
            # Method 3: Check for actual bullet characters - RELIABLE
            elif text.startswith('•') or text.startswith('◦') or text.startswith('▪'):
                is_list_item = True
                text = text[1:].strip()  # Remove bullet character
                print(f"  → BULLET (character): '{text}'")
            
            # REMOVED Method 4 (indentation) - it was too aggressive
            
            print(f"  → Style: {paragraph.style.name}")
            print(f"  → Is list item: {is_list_item}")
            
            if is_list_item:
                # Start new list if needed
                if not current_list:
                    html_content.append('<ul>')
                    current_list = 'ul'
                
                # Add list item
                html_content.append(f'<li>{text}</li>')
                
            else:
                # Close any open list
                close_current_list()
                
                # Read actual Word formatting for regular paragraphs
                alignment = paragraph.alignment
                
                # Determine CSS classes based on actual Word formatting
                css_classes = []
                
                # Check alignment from Word
                if alignment == WD_ALIGN_PARAGRAPH.CENTER:
                    css_classes.append('centered-content')
                    print(f"  → CENTERED (from Word): '{text}'")
                    
                    # Add small caps EXCEPT for contact line
                    if "425" not in text and "Charlotte" not in text and "@gmail.com" not in text:
                        css_classes.append('small-caps')
                        print(f"  → SMALL CAPS: '{text}'")
                    else:
                        print(f"  → CONTACT LINE (no small caps): '{text}'")
                        
                elif alignment == WD_ALIGN_PARAGRAPH.RIGHT:
                    css_classes.append('right-aligned')
                    print(f"  → RIGHT (from Word): '{text}'")
                else:
                    print(f"  → LEFT (from Word): '{text[:50]}...'")
                
                # Special handling for name
                if "Donald Gardner" in text:
                    css_classes.append('name-header')
                    print(f"  → NAME HEADER: '{text}'")
                
                # Check font formatting from runs
                is_bold = False
                if paragraph.runs:
                    # Check if any run is bold
                    is_bold = any(run.font.bold for run in paragraph.runs if run.font.bold)
                
                if is_bold:
                    css_classes.append('bold-text')
                    print(f"  → BOLD: '{text[:30]}...'")
                
                # Build HTML paragraph
                class_attr = f' class="{" ".join(css_classes)}"' if css_classes else ''
                html_content.append(f'<p{class_attr}>{text}</p>')
        
        # Close any remaining list
        close_current_list()
        
        # Join all content
        body_html = '\n'.join(html_content)
        
        # Create final HTML with small caps styling
        final_html = f'''<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Donald Gardner - Resume</title>
            <style>
                body {{
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 30px 20px;
                    background: #f5f5f5;
                    color: #333;
                    line-height: 1.2;
                }}
                
                .resume-container {{
                    background: white;
                    padding: 40px;
                    border-radius: 10px;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                    border: 1px solid #ddd;
                }}
                
                /* Default paragraph styling */
                p {{
                    font-size: 11pt;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
                    margin: 0 0 6px 0;
                    text-align: left;
                }}
                
                /* Name header - larger, bold */
                .name-header {{
                    font-size: 16pt !important;
                    font-weight: bold !important;
                    color: #2c3e50 !important;
                    margin-bottom: 8px !important;
                }}
                
                /* Centered content - directly from Word alignment */
                .centered-content {{
                    text-align: center !important;
                }}
                
                /* Small caps for centered text (except contact info) */
                .small-caps {{
                    font-variant: small-caps !important;
                    letter-spacing: 1px !important;
                    font-weight: 600 !important;
                }}
                
                /* Right aligned content */
                .right-aligned {{
                    text-align: right !important;
                }}
                
                /* Bold text */
                .bold-text {{
                    font-weight: bold !important;
                    color: #2c3e50 !important;
                }}
                
                /* List styling to match Word */
                ul {{
                    margin: 5px 0 10px 25px;
                    padding: 0;
                }}
                
                li {{
                    font-size: 11pt;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
                    margin: 0 0 2px 0;
                    line-height: 1.2;
                }}
                
                /* Links */
                a {{
                    color: #3498db;
                    text-decoration: none;
                }}
                
                a:hover {{
                    text-decoration: underline;
                }}
            </style>
        </head>
        <body>
            <div class="resume-container">
                {body_html}
            </div>
        </body>
        </html>'''
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(final_html)
        
        print("✅ Precise bullet detection - removed aggressive indentation check!")
        EOF
        
    - name: Upload to S3 and Invalidate CloudFront
      run: |
        python3 << 'EOF'
        import boto3
        import time
        
        s3 = boto3.client('s3')
        with open('index.html', 'r', encoding='utf-8') as f:
            s3.put_object(
                Bucket='cloud-challenge01',
                Key='index.html',
                Body=f.read(),
                ContentType='text/html'
            )
        print("✅ Uploaded to S3")
        
        cloudfront = boto3.client('cloudfront')
        cloudfront.create_invalidation(
            DistributionId='E1D217O0NBRUC2',
            InvalidationBatch={
                'Paths': {'Quantity': 1, 'Items': ['/*']},
                'CallerReference': f'auto-{int(time.time())}'
            }
        )
        print("✅ CloudFront invalidated")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
