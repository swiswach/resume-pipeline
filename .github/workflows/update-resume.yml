name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install python-docx mammoth beautifulsoup4 boto3
        
    - name: Convert docx to HTML
      run: |
        python3 << 'EOF'
        import mammoth
        
        with open("resume.docx", "rb") as docx_file:
            result = mammoth.convert_to_html(docx_file)
            html_content = result.value
            
        # Enhanced CSS styling
        full_html = f"""<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Resume</title>
            <style>
                body {{ 
                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                    max-width: 800px; 
                    margin: 0 auto; 
                    padding: 40px 20px;
                    line-height: 1.6;
                    color: #333;
                }}
                h1 {{ 
                    color: #2c3e50; 
                    border-bottom: 3px solid #3498db; 
                    padding-bottom: 10px;
                    margin-bottom: 30px;
                }}
                h2 {{ 
                    color: #34495e; 
                    margin-top: 30px;
                    margin-bottom: 15px;
                }}
                h3 {{ 
                    color: #7f8c8d; 
                    margin-bottom: 10px;
                }}
                p {{ margin-bottom: 15px; }}
                ul {{ margin-left: 20px; }}
                li {{ margin-bottom: 8px; }}
                strong {{ color: #2c3e50; }}
                .contact {{ 
                    text-align: center; 
                    margin-bottom: 30px;
                    padding: 20px;
                    background-color: #f8f9fa;
                    border-radius: 8px;
                }}
            </style>
        </head>
        <body>
            {html_content}
        </body>
        </html>"""
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(full_html)
            
        print("✅ Conversion completed with enhanced CSS")
        EOF
        
    - name: Upload to S3
      run: |
        python3 << 'EOF'
        import boto3
        
        s3 = boto3.client('s3')
        
        with open('index.html', 'r', encoding='utf-8') as f:
            content = f.read()
            
        s3.put_object(
            Bucket='${{ secrets.S3_BUCKET }}',
            Key='index.html',
            Body=content,
            ContentType='text/html'
        )
        print("✅ Uploaded to S3 successfully")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
