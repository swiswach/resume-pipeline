name: Update Resume Website
on:
  push:
    branches: [main]
    paths: ['resume.docx']
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install python-docx mammoth
        
    - name: Convert resume to HTML with proper CSS
      run: |
        python -c "
        import mammoth
        
        print('Converting resume.docx to HTML...')
        
        # Convert Word doc to HTML
        with open('resume.docx', 'rb') as docx_file:
            result = mammoth.convert_to_html(docx_file)
            html_content = result.value
        
        # Create complete HTML page with GOOD CSS
        full_html = '''<!DOCTYPE html>
        <html>
        <head>
        <meta charset=\"utf-8\">
        <title>My Resume</title>
        <style>
        body {
            font-family: \"Calibri\", \"Times New Roman\", serif;
            max-width: 8.5in;
            margin: 0 auto;
            padding: 0.75in;
            background: white;
            color: #000;
            line-height: 1.15;
            font-size: 11pt;
        }
        
        /* Print-like styling */
        @media screen {
            body {
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
                margin: 20px auto;
                background: #f5f5f5;
            }
            .page {
                background: white;
                padding: 0.75in;
                min-height: 10in;
            }
        }
        
        /* Headings */
        h1 {
            font-size: 16pt;
            font-weight: bold;
            text-align: center;
            margin: 0 0 6pt 0;
            color: #000;
        }
        
        h2 {
            font-size: 12pt;
            font-weight: bold;
            margin: 12pt 0 6pt 0;
            color: #000;
            border-bottom: 1pt solid #000;
        }
        
        h3 {
            font-size: 11pt;
            font-weight: bold;
            margin: 6pt 0 3pt 0;
            color: #000;
        }
        
        /* Paragraphs */
        p {
            margin: 0 0 6pt 0;
            text-align: justify;
        }
        
        /* Center contact info */
        p:nth-child(1), p:nth-child(2), p:nth-child(3) {
            text-align: center;
            margin: 3pt 0;
        }
        
        /* Lists */
        ul, ol {
            margin: 6pt 0;
            padding-left: 0.25in;
        }
        
        li {
            margin: 3pt 0;
        }
        
        /* Strong text */
        strong, b {
            font-weight: bold;
        }
        
        /* Italic text */
        em, i {
            font-style: italic;
        }
        
        /* Links */
        a {
            color: #0000EE;
            text-decoration: underline;
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 6pt 0;
        }
        
        td, th {
            padding: 3pt;
            vertical-align: top;
        }
        </style>
        </head>
        <body>
        <div class=\"page\">
        ''' + html_content + '''
        </div>
        </body>
        </html>'''
        
        # Save as index.html
        with open('index.html', 'w', encoding='utf-8') as f:
            f.write(full_html)
        
        print('✅ Resume converted with professional styling!')
        "
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Deploy to S3
      run: |
        aws s3 sync . s3://cloud-challenge01 --exclude ".git/*" --exclude ".github/*" --exclude "*.docx"
