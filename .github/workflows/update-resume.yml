name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install mammoth boto3 beautifulsoup4
        
    - name: Convert Preserving Original Formatting
      run: |
        python3 << 'EOF'
        import mammoth
        from bs4 import BeautifulSoup
        
        # Convert with Mammoth - preserve original formatting
        with open("resume.docx", "rb") as docx_file:
            result = mammoth.convert_to_html(docx_file)
            raw_html = result.value
        
        print("=== Preserving original Word formatting ===")
        print("Raw HTML preview:")
        print(raw_html[:400])
        
        # Parse HTML but DON'T modify alignment - just add font styling
        soup = BeautifulSoup(raw_html, 'html.parser')
        
        # Only identify Donald Gardner for special font size (no alignment changes)
        for p in soup.find_all('p'):
            text = p.get_text().strip()
            if "Donald Gardner" in text:
                p['class'] = p.get('class', []) + ['name-header']
        
        # Get modified HTML (minimal changes)
        modified_html = str(soup)
        
        # Create final HTML - preserve all original formatting, only change fonts
        final_html = f'''<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Donald Gardner - Resume</title>
            <style>
                body {{
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 30px 20px;
                    background: #f5f5f5;
                    color: #333;
                }}
                
                .resume-container {{
                    background: white;
                    padding: 40px;
                    border-radius: 10px;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                    border: 1px solid #ddd;
                }}
                
                /* Default styling - 11pt Calibri, preserve all original formatting */
                p, div, span, li, ul, ol {{
                    font-size: 11pt !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                    /* DO NOT override margins, alignment, or spacing */
                }}
                
                /* Only Donald Gardner gets 16pt */
                .name-header {{
                    font-size: 16pt !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                    font-weight: bold !important;
                    color: #2c3e50 !important;
                    /* Keep original alignment from Word */
                }}
                
                /* Preserve original spacing for lists */
                ul, ol {{
                    /* Don't override margins - use Word's spacing */
                }}
                
                li {{
                    /* Don't override margins - use Word's spacing */
                }}
                
                strong {{
                    color: #2c3e50;
                    font-weight: 600;
                }}
                
                a {{
                    color: #3498db;
                    text-decoration: none;
                }}
                
                a:hover {{
                    text-decoration: underline;
                }}
            </style>
        </head>
        <body>
            <div class="resume-container">
                {modified_html}
            </div>
        </body>
        </html>'''
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(final_html)
        
        print("✅ Formatting preserved from Word document")
        print("✅ Only fonts changed: Donald Gardner 16pt, everything else 11pt Calibri")
        EOF
        
    - name: Upload to S3 and Invalidate CloudFront
      run: |
        python3 << 'EOF'
        import boto3
        import time
        
        s3 = boto3.client('s3')
        with open('index.html', 'r', encoding='utf-8') as f:
            s3.put_object(
                Bucket='cloud-challenge01',
                Key='index.html',
                Body=f.read(),
                ContentType='text/html'
            )
        print("✅ Uploaded to S3")
        
        cloudfront = boto3.client('cloudfront')
        cloudfront.create_invalidation(
            DistributionId='E1D217O0NBRUC2',
            InvalidationBatch={
                'Paths': {'Quantity': 1, 'Items': ['/*']},
                'CallerReference': f'auto-{int(time.time())}'
            }
        )
        print("✅ CloudFront invalidated")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
