name: Deploy Resume to S3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install python-docx
    
    - name: Extract resume content
      run: |
        python scripts/extract_resume.py
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Deploy to S3
      run: |
        aws s3 sync . s3://cloud-challenge01 --exclude "*.git/*" --exclude "scripts/*" --exclude "resume.docx" --exclude "*.yml"
    
    - name: Invalidate CloudFront
      run: |
        aws cloudfront create-invalidation --distribution-id E1D217O0NBRUC2 --paths "/*"
