name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install mammoth boto3
        
    - name: Convert docx to HTML with CSS
      run: |
        python3 << 'EOF'
        import mammoth
        
        # Convert docx to HTML
        with open("resume.docx", "rb") as docx_file:
            result = mammoth.convert_to_html(docx_file)
            content = result.value
        
        # Debug: Print first part of content
        print("=== HTML Content Preview ===")
        print(content[:300])
        
        # Enhanced HTML with stronger CSS
        html = f'''<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Donald Gardner - Resume</title>
            <style>
                * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                body {{ 
                    font-family: Arial, sans-serif !important; 
                    max-width: 800px !important; 
                    margin: 20px auto !important; 
                    padding: 30px !important; 
                    line-height: 1.6 !important; 
                    color: #333 !important;
                    background-color: white !important;
                }}
                h1 {{ 
                    text-align: center !important; 
                    color: #2c3e50 !important; 
                    font-size: 2.5em !important; 
                    margin-bottom: 15px !important;
                    font-weight: bold !important;
                }}
                h2 {{ 
                    text-align: center !important; 
                    color: #2c3e50 !important; 
                    border-bottom: 3px solid #3498db !important; 
                    padding-bottom: 8px !important; 
                    margin-top: 35px !important;
                    margin-bottom: 20px !important;
                    font-size: 1.8em !important;
                }}
                p {{ 
                    margin-bottom: 15px !important; 
                    font-size: 16px !important;
                }}
                p:nth-of-type(1) {{ 
                    text-align: center !important; 
                    font-size: 1.2em !important; 
                    margin-bottom: 35px !important;
                    color: #555 !important;
                }}
                ul {{ margin-left: 25px !important; margin-bottom: 15px !important; }}
                li {{ margin-bottom: 8px !important; }}
                strong {{ color: #2c3e50 !important; font-weight: 600 !important; }}
                a {{ color: #3498db !important; text-decoration: none !important; }}
                a:hover {{ text-decoration: underline !important; }}
            </style>
        </head>
        <body>
            {content}
        </body>
        </html>'''
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(html)
        
        # Debug: Print final HTML length
        print(f"=== Final HTML Length: {len(html)} characters ===")
        print("✅ HTML created with enhanced CSS styling")
        EOF
        
    - name: Upload to S3 and Invalidate CloudFront
      run: |
        python3 << 'EOF'
        import boto3
        import time
        
        # Upload to S3
        s3 = boto3.client('s3')
        with open('index.html', 'r', encoding='utf-8') as f:
            s3.put_object(
                Bucket='cloud-challenge01',
                Key='index.html',
                Body=f.read(),
                ContentType='text/html'
            )
        print("✅ Uploaded to S3")
        
        # Invalidate CloudFront
        cloudfront = boto3.client('cloudfront')
        cloudfront.create_invalidation(
            DistributionId='E1D217O0NBRUC2',
            InvalidationBatch={
                'Paths': {'Quantity': 1, 'Items': ['/*']},
                'CallerReference': f'auto-{int(time.time())}'
            }
        )
        print("✅ CloudFront invalidated")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
