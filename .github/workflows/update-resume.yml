name: Update Resume Website
on:
  push:
    branches: [main]
    paths: ['resume.docx']
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: pip install python-docx mammoth beautifulsoup4
    - name: Convert resume with proper formatting
      run: |
        python -c "
        import mammoth
        from bs4 import BeautifulSoup
        
        # Convert Word to HTML
        with open('resume.docx', 'rb') as f:
            html = mammoth.convert_to_html(f).value
        
        # Parse HTML to fix section titles
        soup = BeautifulSoup(html, 'html.parser')
        
        # Mark the first paragraph as the name
        first_p = soup.find('p')
        if first_p:
            first_p['class'] = 'name-title'
            print(f'Found name: {first_p.get_text()[:50]}...')
        
        # Find and mark specific paragraphs
        paragraphs = soup.find_all('p')
        for i, p in enumerate(paragraphs):
            text = p.get_text().strip()
            
            # Contact info paragraph (contains phone and email)
            if '(425) 245-4899' in text or 'Donald.gardner4321@gmail.com' in text:
                p['class'] = 'contact-info'
                print(f'Found contact info: {text[:50]}...')
            
            # Professional summary paragraph (the long paragraph)
            elif 'Customer-focused cybersecurity professional' in text:
                p['class'] = 'professional-summary'
                print(f'Found professional summary: {text[:50]}...')
        
        # Find section titles and mark them
        section_titles = [
            'key accomplishments', 'professional experience', 
            'training and education', 'education and training',
            'certifications', 'community involvement'
        ]
        
        for element in soup.find_all(['p', 'h1', 'h2', 'h3']):
            text = element.get_text().strip().lower()
            if any(title in text for title in section_titles):
                element['class'] = 'section-title'
                print(f'Found section: {element.get_text()}')
        
        html = str(soup)
        
        css = '''<style>
        body{font-family:Calibri,sans-serif;margin:0;padding:40px;background:linear-gradient(135deg,#f5f7fa,#c3cfe2);min-height:100vh}
        .container{max-width:8.5in;margin:0 auto;background:white;padding:0.75in;box-shadow:0 4px 8px rgba(0,0,0,0.1),0 6px 20px rgba(0,0,0,0.15);border-radius:8px}
        
        /* Name at top - centered, bold, Calibri 16 */
        .name-title{
            font-family:Calibri,sans-serif !important;
            font-size:16pt !important;
            font-weight:bold !important;
            text-align:center !important;
            margin:0 0 8pt 0 !important;
            color:#2c3e50 !important;
        }
        
        /* Contact info - centered */
        .contact-info{
            font-family:Calibri,sans-serif !important;
            font-size:11pt !important;
            text-align:center !important;
            margin:0 0 18pt 0 !important;
            color:#7f8c8d !important;
        }
        
        /* Professional summary - left justified paragraph */
        .professional-summary{
            font-family:Calibri,sans-serif !important;
            font-size:11pt !important;
            text-align:left !important;
            margin:0 0 18pt 0 !important;
            line-height:1.4 !important;
            text-indent:0.25in !important;
            color:#000 !important;
        }
        
        /* Section titles - centered, small caps, Calibri 16, no blue line */
        .section-title{
            font-family:Calibri,sans-serif !important;
            font-size:16pt !important;
            font-weight:normal !important;
            text-align:center !important;
            margin:24pt 0 12pt 0 !important;
            color:#2c3e50 !important;
            font-variant:small-caps !important;
            border:none !important;
            padding-bottom:0 !important;
        }
        
        h1,h2{font-size:14pt;text-align:center;margin:18pt 0 12pt 0;color:#2c3e50}
        p{margin:0 0 6pt 0;font-family:Calibri,sans-serif}
        strong{color:#2c3e50}
        ul,ol{margin:6pt 0;padding-left:0.25in}
        li{margin:3pt 0}
        </style>'''
        
        with open('index.html', 'w') as f:
            f.write(f'<html><head>{css}</head><body><div class=\"container\">{html}</div></body></html>')
        
        print('✅ Resume converted with proper formatting!')
        "
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Deploy to S3
      run: |
        aws s3 sync . s3://cloud-challenge01 --exclude ".git/*" --exclude ".github/*" --exclude "*.docx"
        
    - name: Auto-invalidate CloudFront
      run: |
        aws cloudfront create-invalidation \
          --distribution-id E1D217O0NBRUC2 \
          --paths "/*" \
          --query 'Invalidation.Id' \
          --output text
        echo "✅ CloudFront invalidation created - your site will update in 5-30 seconds!"
