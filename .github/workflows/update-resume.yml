name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install mammoth boto3 beautifulsoup4
        
    - name: Convert with Fixed Mammoth Style Mapping
      run: |
        python3 << 'EOF'
        import mammoth
        from bs4 import BeautifulSoup
        
        # Simpler style mapping approach
        style_map = """
        p:center => p.centered-content
        """
        
        # Convert with style mapping
        with open("resume.docx", "rb") as docx_file:
            result = mammoth.convert_to_html(
                docx_file,
                style_map=style_map
            )
            raw_html = result.value
        
        print("=== Fixed Mammoth conversion ===")
        print("Conversion messages:", result.messages)
        
        # Parse HTML and add content-based detection as backup
        soup = BeautifulSoup(raw_html, 'html.parser')
        
        for p in soup.find_all('p'):
            text = p.get_text().strip()
            if text:
                # Donald Gardner gets name header class
                if "Donald Gardner" in text:
                    p['class'] = p.get('class', []) + ['name-header']
                
                # Add professional title detection as backup
                elif text == "Cyber Security Researcher":
                    p['class'] = p.get('class', []) + ['centered-content']
                    print(f"CENTERING (backup): {text}")
                
                # Check what Mammoth found
                if 'centered-content' in p.get('class', []):
                    print(f"CENTERED (Mammoth): {text}")
        
        modified_html = str(soup)
        
        # Same gorgeous CSS as before
        final_html = f'''<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Donald Gardner - Resume</title>
            <style>
                body {{
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 30px 20px;
                    background: #f5f5f5;
                    color: #333;
                    line-height: 1.2;
                }}
                
                .resume-container {{
                    background: white;
                    padding: 40px;
                    border-radius: 10px;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                    border: 1px solid #ddd;
                }}
                
                p, div, span {{
                    font-size: 11pt !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                    margin: 0 0 6px 0 !important;
                    text-align: left !important;
                }}
                
                .name-header {{
                    font-size: 16pt !important;
                    font-weight: bold !important;
                    color: #2c3e50 !important;
                    margin-bottom: 8px !important;
                }}
                
                .centered-content {{
                    text-align: center !important;
                }}
                
                ul, ol {{
                    margin: 5px 0 10px 25px !important;
                    padding: 0 !important;
                }}
                
                li {{
                    font-size: 11pt !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                    margin: 0 0 2px 0 !important;
                    line-height: 1.2 !important;
                }}
                
                strong {{
                    color: #2c3e50;
                    font-weight: 600;
                }}
                
                a {{
                    color: #3498db;
                    text-decoration: none;
                }}
                
                a:hover {{
                    text-decoration: underline;
                }}
            </style>
        </head>
        <body>
            <div class="resume-container">
                {modified_html}
            </div>
        </body>
        </html>'''
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(final_html)
        
        print("✅ Fixed syntax - should work now!")
        EOF
        
    - name: Upload to S3 and Invalidate CloudFront
      run: |
        python3 << 'EOF'
        import boto3
        import time
        
        s3 = boto3.client('s3')
        with open('index.html', 'r', encoding='utf-8') as f:
            s3.put_object(
                Bucket='cloud-challenge01',
                Key='index.html',
                Body=f.read(),
                ContentType='text/html'
            )
        print("✅ Uploaded to S3")
        
        cloudfront = boto3.client('cloudfront')
        cloudfront.create_invalidation(
            DistributionId='E1D217O0NBRUC2',
            InvalidationBatch={
                'Paths': {'Quantity': 1, 'Items': ['/*']},
                'CallerReference': f'auto-{int(time.time())}'
            }
        )
        print("✅ CloudFront invalidated")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
