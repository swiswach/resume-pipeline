name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install mammoth boto3
        
    - name: Convert docx to HTML with CSS
      run: |
        python3 << 'EOF'
        import mammoth
        
        # Convert docx to HTML
        with open("resume.docx", "rb") as docx_file:
            result = mammoth.convert_to_html(docx_file)
            content = result.value
        
        # Simple HTML with clean CSS
        html = f'''<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Donald Gardner - Resume</title>
            <style>
                body {{ font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.6; color: #333; }}
                h1 {{ text-align: center; color: #2c3e50; font-size: 2.2em; margin-bottom: 10px; }}
                h2 {{ text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 30px; }}
                p:first-of-type {{ text-align: center; font-size: 1.1em; margin-bottom: 30px; }}
                p {{ margin-bottom: 12px; }}
                ul {{ margin-left: 20px; }}
                li {{ margin-bottom: 6px; }}
                strong {{ color: #2c3e50; }}
                a {{ color: #3498db; text-decoration: none; }}
                a:hover {{ text-decoration: underline; }}
            </style>
        </head>
        <body>
            {content}
        </body>
        </html>'''
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(html)
        print("✅ HTML created with CSS styling")
        EOF
        
    - name: Upload to S3 and Invalidate CloudFront
      run: |
        python3 << 'EOF'
        import boto3
        import time
        
        # Upload to S3
        s3 = boto3.client('s3')
        with open('index.html', 'r', encoding='utf-8') as f:
            s3.put_object(
                Bucket='cloud-challenge01',
                Key='index.html',
                Body=f.read(),
                ContentType='text/html'
            )
        print("✅ Uploaded to S3")
        
        # Invalidate CloudFront
        cloudfront = boto3.client('cloudfront')
        cloudfront.create_invalidation(
            DistributionId='E1D217O0NBRUC2',
            InvalidationBatch={
                'Paths': {'Quantity': 1, 'Items': ['/*']},
                'CallerReference': f'auto-{int(time.time())}'
            }
        )
        print("✅ CloudFront invalidated")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
