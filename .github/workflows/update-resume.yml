name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install mammoth boto3 beautifulsoup4
        
    - name: Convert with Mammoth Style Mapping
      run: |
        python3 << 'EOF'
        import mammoth
        from bs4 import BeautifulSoup
        
        # Configure Mammoth to preserve alignment styles
        style_map = """
        p[style-name='centered'] => p.centered-content
        p[style-name='center'] => p.centered-content
        p[style-name='Center'] => p.centered-content
        p[style-name='Centered'] => p.centered-content
        """
        
        # Convert with style mapping to preserve alignment
        with open("resume.docx", "rb") as docx_file:
            result = mammoth.convert_to_html(
                docx_file,
                style_map=style_map,
                transform_document=mammoth.transforms.paragraph(
                    lambda paragraph: paragraph.alignment == "center",
                    lambda paragraph: paragraph.with_style_name("centered")
                )
            )
            raw_html = result.value
        
        print("=== Mammoth with alignment preservation ===")
        print("Conversion messages:", result.messages)
        print("HTML preview:")
        print(raw_html[:500])
        
        # Parse HTML
        soup = BeautifulSoup(raw_html, 'html.parser')
        
        # Only identify Donald Gardner for special font size
        for p in soup.find_all('p'):
            text = p.get_text().strip()
            if "Donald Gardner" in text:
                p['class'] = p.get('class', []) + ['name-header']
                print(f"Found name: {text}")
            
            # Check what classes Mammoth assigned
            if p.get('class'):
                print(f"Paragraph with classes {p.get('class')}: '{text[:50]}...'")
        
        # Get modified HTML
        modified_html = str(soup)
        
        # Create final HTML with alignment preserved
        final_html = f'''<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Donald Gardner - Resume</title>
            <style>
                body {{
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 30px 20px;
                    background: #f5f5f5;
                    color: #333;
                    line-height: 1.2;
                }}
                
                .resume-container {{
                    background: white;
                    padding: 40px;
                    border-radius: 10px;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                    border: 1px solid #ddd;
                }}
                
                /* Default - 11pt Calibri, left aligned */
                p, div, span {{
                    font-size: 11pt !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                    margin: 0 0 6px 0 !important;
                    text-align: left !important;
                }}
                
                /* Name header - 16pt */
                .name-header {{
                    font-size: 16pt !important;
                    font-weight: bold !important;
                    color: #2c3e50 !important;
                    margin-bottom: 8px !important;
                }}
                
                /* Centered content from Word alignment */
                .centered-content {{
                    text-align: center !important;
                    font-variant: small-caps !important;
                    letter-spacing: 1px !important;
                    font-weight: 600 !important;
                    color: #2c3e50 !important;
                    margin: 15px 0 !important;
                }}
                
                /* Override small caps for name */
                .name-header.centered-content {{
                    font-variant: normal !important;
                    letter-spacing: 2px !important;
                }}
                
                /* Lists - single spaced */
                ul, ol {{
                    margin: 5px 0 10px 25px !important;
                    padding: 0 !important;
                }}
                
                li {{
                    font-size: 11pt !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                    margin: 0 0 2px 0 !important;
                    line-height: 1.2 !important;
                }}
                
                strong {{
                    color: #2c3e50;
                    font-weight: 600;
                }}
                
                a {{
                    color: #3498db;
                    text-decoration: none;
                }}
                
                a:hover {{
                    text-decoration: underline;
                }}
            </style>
        </head>
        <body>
            <div class="resume-container">
                {modified_html}
            </div>
        </body>
        </html>'''
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(final_html)
        
        print("✅ Mammoth style mapping applied - alignment preserved from Word")
        EOF
        
    - name: Upload to S3 and Invalidate CloudFront
      run: |
        python3 << 'EOF'
        import boto3
        import time
        
        s3 = boto3.client('s3')
        with open('index.html', 'r', encoding='utf-8') as f:
            s3.put_object(
                Bucket='cloud-challenge01',
                Key='index.html',
                Body=f.read(),
                ContentType='text/html'
            )
        print("✅ Uploaded to S3")
        
        cloudfront = boto3.client('cloudfront')
        cloudfront.create_invalidation(
            DistributionId='E1D217O0NBRUC2',
            InvalidationBatch={
                'Paths': {'Quantity': 1, 'Items': ['/*']},
                'CallerReference': f'auto-{int(time.time())}'
            }
        )
        print("✅ CloudFront invalidated")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
