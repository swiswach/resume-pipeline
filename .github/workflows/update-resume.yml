name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install mammoth boto3 beautifulsoup4
        
    - name: Convert and Apply Smart Styling
      run: |
        python3 << 'EOF'
        import mammoth
        from bs4 import BeautifulSoup
        
        # Convert with Mammoth
        with open("resume.docx", "rb") as docx_file:
            result = mammoth.convert_to_html(docx_file)
            raw_html = result.value
        
        print("=== Processing HTML with smart detection ===")
        
        # Parse HTML
        soup = BeautifulSoup(raw_html, 'html.parser')
        
        # Smart detection: Find paragraphs that should be centered
        # Look for short lines, headers, or lines that appear to be titles
        for p in soup.find_all('p'):
            text = p.get_text().strip()
            
            if text:
                # Detect if this should be centered (short lines, likely headers)
                words = text.split()
                is_likely_header = (
                    len(words) <= 6 or  # Short lines
                    any(word.isupper() for word in words) or  # Has uppercase words
                    text.endswith(':') or  # Ends with colon
                    any(keyword in text for keyword in ['Donald Gardner', 'Key', 'Professional', 'Education', 'Certifications', 'Community', '425', 'gmail', 'LinkedIn', 'YouTube'])
                )
                
                if is_likely_header:
                    p['class'] = p.get('class', []) + ['centered-content']
                    
                    # Special case for name
                    if "Donald Gardner" in text:
                        p['class'] = p.get('class', []) + ['name-header']
        
        # Get modified HTML
        modified_html = str(soup)
        
        # Create final HTML with Calibri and proper sizing
        final_html = f'''<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Donald Gardner - Resume</title>
            <style>
                body {{
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 30px 20px;
                    background: #f5f5f5;
                    color: #333;
                    line-height: 1.6;
                }}
                
                .resume-container {{
                    background: white;
                    padding: 40px;
                    border-radius: 10px;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                    border: 1px solid #ddd;
                }}
                
                /* Default styling - 11pt Calibri for everything */
                p, div, span, li, ul, ol {{
                    font-size: 11pt !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                    margin-bottom: 8px;
                }}
                
                /* Name header - 16pt Calibri */
                .name-header {{
                    text-align: center !important;
                    font-size: 16pt !important;
                    font-weight: bold !important;
                    color: #2c3e50 !important;
                    margin-bottom: 15px !important;
                    font-family: Calibri, 'Segoe UI', Arial, sans-serif !important;
                }}
                
                /* Any centered content gets small caps */
                .centered-content {{
                    text-align: center !important;
                    font-variant: small-caps !important;
                    letter-spacing: 1px !important;
                    margin: 15px 0 !important;
                    font-weight: 600 !important;
                    color: #2c3e50 !important;
                }}
                
                /* Override small caps for name (keep it normal caps) */
                .name-header.centered-content {{
                    font-variant: normal !important;
                    letter-spacing: 2px !important;
                }}
                
                strong {{
                    color: #2c3e50;
                    font-weight: 600;
                }}
                
                ul {{
                    margin-left: 25px;
                    margin-bottom: 15px;
                }}
                
                li {{
                    margin-bottom: 4px;
                    line-height: 1.4;
                }}
                
                a {{
                    color: #3498db;
                    text-decoration: none;
                }}
                
                a:hover {{
                    text-decoration: underline;
                }}
            </style>
        </head>
        <body>
            <div class="resume-container">
                {modified_html}
            </div>
        </body>
        </html>'''
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(final_html)
        
        print("✅ Smart styling applied:")
        print("  - Auto-detected centered content")
        print("  - Donald Gardner: 16pt Calibri")
        print("  - Everything else: 11pt Calibri")
        print("  - All centered lines: small caps")
        EOF
        
    - name: Upload to S3 and Invalidate CloudFront
      run: |
        python3 << 'EOF'
        import boto3
        import time
        
        s3 = boto3.client('s3')
        with open('index.html', 'r', encoding='utf-8') as f:
            s3.put_object(
                Bucket='cloud-challenge01',
                Key='index.html',
                Body=f.read(),
                ContentType='text/html'
            )
        print("✅ Uploaded to S3")
        
        cloudfront = boto3.client('cloudfront')
        cloudfront.create_invalidation(
            DistributionId='E1D217O0NBRUC2',
            InvalidationBatch={
                'Paths': {'Quantity': 1, 'Items': ['/*']},
                'CallerReference': f'auto-{int(time.time())}'
            }
        )
        print("✅ CloudFront invalidated")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
