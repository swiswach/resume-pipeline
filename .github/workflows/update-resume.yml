name: Update Resume Website
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install mammoth boto3 beautifulsoup4
        
    - name: Convert and Fix HTML Structure
      run: |
        python3 << 'EOF'
        import mammoth
        from bs4 import BeautifulSoup
        
        # Convert with Mammoth
        with open("resume.docx", "rb") as docx_file:
            result = mammoth.convert_to_html(docx_file)
            raw_html = result.value
        
        print("=== RAW MAMMOTH OUTPUT ===")
        print(raw_html[:500])
        print("=" * 50)
        
        # Parse and modify the HTML
        soup = BeautifulSoup(raw_html, 'html.parser')
        
        # Find and modify specific content
        center_keywords = ["Donald Gardner", "Key Accomplishments", "Professional Experience", 
                          "Education & Training", "Certifications", "Community Involvement"]
        
        for p in soup.find_all('p'):
            text = p.get_text().strip()
            
            # Check if this paragraph should be centered
            for keyword in center_keywords:
                if keyword in text:
                    p['class'] = p.get('class', []) + ['center-text']
                    if "Donald Gardner" in text:
                        p['class'] = p.get('class', []) + ['name-header']
                    elif any(section in text for section in ["Key Accomplishments", "Professional Experience", "Education", "Certifications", "Community"]):
                        p['class'] = p.get('class', []) + ['section-header']
                    break
        
        # Get the modified HTML
        modified_html = str(soup)
        
        # Create final HTML with proper CSS
        final_html = f'''<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Donald Gardner - Resume</title>
            <style>
                body {{
                    font-family: 'Segoe UI', Arial, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 30px 20px;
                    background: #f5f5f5;
                    color: #333;
                    line-height: 1.6;
                }}
                
                .resume-container {{
                    background: white;
                    padding: 40px;
                    border-radius: 10px;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                    border: 1px solid #ddd;
                }}
                
                .name-header {{
                    text-align: center !important;
                    font-size: 2.2em !important;
                    font-weight: bold !important;
                    color: #2c3e50 !important;
                    margin-bottom: 15px !important;
                }}
                
                .section-header {{
                    text-align: center !important;
                    font-size: 1.5em !important;
                    font-weight: bold !important;
                    color: #2c3e50 !important;
                    margin-top: 35px !important;
                    margin-bottom: 20px !important;
                    padding-bottom: 8px !important;
                    border-bottom: 2px solid #3498db !important;
                }}
                
                .center-text {{
                    text-align: center !important;
                    margin: 15px 0 !important;
                }}
                
                p {{
                    margin-bottom: 12px;
                    font-size: 14px;
                }}
                
                strong {{
                    color: #2c3e50;
                    font-weight: 600;
                }}
                
                ul {{
                    margin-left: 25px;
                    margin-bottom: 15px;
                }}
                
                li {{
                    margin-bottom: 6px;
                    line-height: 1.5;
                }}
                
                a {{
                    color: #3498db;
                    text-decoration: none;
                }}
                
                a:hover {{
                    text-decoration: underline;
                }}
            </style>
        </head>
        <body>
            <div class="resume-container">
                {modified_html}
            </div>
        </body>
        </html>'''
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(final_html)
        
        print("✅ HTML created with targeted modifications")
        print("Modified HTML preview:")
        print(modified_html[:300])
        EOF
        
    - name: Upload to S3 and Invalidate CloudFront
      run: |
        python3 << 'EOF'
        import boto3
        import time
        
        s3 = boto3.client('s3')
        with open('index.html', 'r', encoding='utf-8') as f:
            s3.put_object(
                Bucket='cloud-challenge01',
                Key='index.html',
                Body=f.read(),
                ContentType='text/html'
            )
        print("✅ Uploaded to S3")
        
        cloudfront = boto3.client('cloudfront')
        cloudfront.create_invalidation(
            DistributionId='E1D217O0NBRUC2',
            InvalidationBatch={
                'Paths': {'Quantity': 1, 'Items': ['/*']},
                'CallerReference': f'auto-{int(time.time())}'
            }
        )
        print("✅ CloudFront invalidated")
        EOF
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
