name: Update Resume Website
on:
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check files
      run: |
        ls -la
        echo "Looking for resume.docx..."
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install python-docx mammoth beautifulsoup4
      
    - name: Test conversion
      run: |
        python3 -c "
        import mammoth
        print('Mammoth imported successfully')
        import os
        if os.path.exists('resume.docx'):
            print('resume.docx found!')
        else:
            print('resume.docx NOT found!')
            print('Files in directory:', os.listdir('.'))
        "
